# pixi.toml -- environment + editable installs for pet-sim-gen.
#
# pixi manages the Python environment AND installs your own package (and the
# mcgpu-pet-wrapper it depends on) in editable mode, so `import pet_sim_gen`
# works anywhere inside the pixi environment and edits are live.
#
# Adjust the mcgpu-pet-wrapper path below to wherever you cloned it.

[project]
name = "pet-sim-gen"
version = "0.1.0"
description = "Generate diverse Monte Carlo PET datasets for downstream ML."
channels = ["conda-forge"]
platforms = ["linux-64"]   # add "osx-arm64", "win-64" if needed

[dependencies]
python = ">=3.10"
numpy = ">=1.24"
# optional, for inspecting voxel slices / sinograms:
matplotlib = "*"

[pypi-dependencies]
# This package itself, editable: makes `import pet_sim_gen` work everywhere
# and stay live as you edit the source.
pet-sim-gen = { path = ".", editable = true }

# The simulator wrapper this package drives. It is a separate local repo (not on
# PyPI). Point this at wherever you cloned mcgpu-pet-wrapper. If the wrapper has
# its own GPU/CUDA conda deps, prefer installing it in ITS OWN pixi env and
# running generation from there, OR add its conda deps here. See README.
mcgpu_pet_wrapper = { path = "../mcgpu-pet-wrapper", editable = true }

[tasks]
# convenience: `pixi run gen --n 50 --out data`
gen = "python -m pet_sim_gen.generate"
# `pixi run inspect` -> GPU-free recipe sanity check
inspect = "python -m pet_sim_gen.sampler bounds.json"